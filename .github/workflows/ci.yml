name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Simulation report smoke
        run: npm run sim:report:smoke

      - name: Browser render smoke
        run: npm run test:e2e

      - name: Upload render artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-artifacts
          path: |
            artifacts/screenshots
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Build
        run: npm run build
